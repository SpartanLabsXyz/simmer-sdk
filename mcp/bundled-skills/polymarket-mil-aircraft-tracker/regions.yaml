# Region definitions for military aircraft cluster detection.
# Each region: center lat/lon + radius OR bounding box, cluster threshold,
# and associated Polymarket market keywords for matching.
version: "1.0.0"
updated: "2026-05-24"

regions:
  - name: persian-gulf
    lat_min: 24.0
    lat_max: 30.0
    lon_min: 50.0
    lon_max: 60.0
    cluster_threshold: 3
    keywords: ["Iran", "Hormuz", "Persian Gulf", "IRGC"]

  - name: diego-garcia
    lat_min: -8.0
    lat_max: -6.0
    lon_min: 71.0
    lon_max: 73.0
    cluster_threshold: 2
    keywords: ["Iran", "Diego Garcia", "B-2", "bomber"]

  - name: eastern-mediterranean
    lat_min: 32.0
    lat_max: 36.0
    lon_min: 30.0
    lon_max: 36.0
    cluster_threshold: 3
    keywords: ["Israel", "Iran", "Hezbollah", "Syria", "Lebanon"]

  - name: korean-peninsula
    lat_min: 33.0
    lat_max: 39.0
    lon_min: 124.0
    lon_max: 130.0
    cluster_threshold: 3
    keywords: ["Korea", "North Korea", "DPRK", "Kim Jong Un"]

  - name: south-china-sea
    lat_min: 5.0
    lat_max: 22.0
    lon_min: 105.0
    lon_max: 122.0
    cluster_threshold: 3
    keywords: ["Taiwan", "China", "South China Sea", "strait"]
