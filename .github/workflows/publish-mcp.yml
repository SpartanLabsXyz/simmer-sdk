name: Publish MCP to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pack only, no publish)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Build
        working-directory: mcp
        run: npm run build

      - name: Bundle skills
        working-directory: mcp
        run: npm run bundle-skills

      - name: Pack simmer-mcp (dry run check)
        working-directory: mcp
        run: npm pack --dry-run

      - name: Publish simmer-mcp
        if: ${{ !inputs.dry_run }}
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack simmer-autoresearch stub (dry run check)
        working-directory: mcp/deprecated/simmer-autoresearch
        run: npm pack --dry-run

      - name: Publish simmer-autoresearch deprecation stub
        if: ${{ !inputs.dry_run }}
        working-directory: mcp/deprecated/simmer-autoresearch
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set npm deprecation notice on simmer-autoresearch
        if: ${{ !inputs.dry_run }}
        run: >-
          npm deprecate simmer-autoresearch "This package has been renamed to simmer-mcp. Run: npm install -g simmer-mcp"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
