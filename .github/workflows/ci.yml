name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check skill governance
        run: python3 scripts/check-skill-governance.py

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: Import smoke test
        run: python -c "from simmer_sdk import SimmerClient; from simmer_sdk.signing import SignedOrder; print('OK')"

      - name: Run tests (if present)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/
          else
            echo "No tests directory — skipping"
          fi

  mcp-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python (for per-skill execution + py_compile tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK (for runtime-probe test)
        run: pip install -e .

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci

      - name: Build + test MCP package
        working-directory: mcp
        run: npm test
