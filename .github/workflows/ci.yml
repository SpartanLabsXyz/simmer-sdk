name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: Import smoke test
        run: python -c "from simmer_sdk import SimmerClient; from simmer_sdk.signing import sign_order; print('OK')"

      - name: Run tests (if present)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/
          else
            echo "No tests directory — skipping"
          fi
